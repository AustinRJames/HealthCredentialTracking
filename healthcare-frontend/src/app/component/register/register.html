<div>
    <form (ngSubmit)="onRegister()">
        <div style="margin-bottom: 15px;">
            <label style="font-weight: bold;">Email</label>
            <input type="text" [(ngModel)]="email" name="email" style="width: 100%; padding: 8px; margin-top: 5px;" required>
        </div>

        <div style="margin-bottom: 15px;">
            <label style="font-weight: bold;">Username</label>
            <input type="text" [(ngModel)]="username" name="username" style="width: 100%; padding: 8px; margin-top: 5px;" required>
        </div>
        
        <div style="margin-bottom: 20px;">
            <label style="font-weight: bold;">Password</label>
            <input type="password" [(ngModel)]="password" name="password" style="width: 100%; padding: 8px; margin-top: 5px;" required>
        </div>

        <button type="submit" style="width: 100%; padding: 10px; background-color: #0d6efd; color: white; border: none; border-radius: 3px; cursor: pointer; font-size: 16px;">
            Register
        </button>
    </form> 
</div>
